name: napari-colocalisation
display_name: Colocalisation
# use 'hidden' to remove plugin from napari hub search results
visibility: public
# see https://napari.org/stable/plugins/technical_references/manifest.html#fields for valid categories
# categories: []
contributions:
  commands:
    - id: napari-colocalisation.make_sample_data
      python_name: napari_colocalisation._sample_data:make_sample_data
      title: Load sample data from Colocalisation
    - id: napari-colocalisation.make_container_widget
      python_name: napari_colocalisation:ImageThreshold
      title: Make threshold Container widget
    - id: napari-colocalisation.make_magic_widget
      python_name: napari_colocalisation:threshold_magic_widget
      title: Make threshold magic widget
    - id: napari-colocalisation.make_function_widget
      python_name: napari_colocalisation:threshold_autogenerate_widget
      title: Make threshold function widget
    - id: napari-colocalisation.make_qwidget
      python_name: napari_colocalisation:ExampleQWidget
      title: Make example QWidget
  sample_data:
    - command: napari-colocalisation.make_sample_data
      display_name: Colocalisation
      key: unique_id.1
  widgets:
    - command: napari-colocalisation.make_container_widget
      display_name: Container Threshold
    - command: napari-colocalisation.make_magic_widget
      display_name: Magic Threshold
    - command: napari-colocalisation.make_function_widget
      autogenerate: true
      display_name: Autogenerate Threshold
    - command: napari-colocalisation.make_qwidget
      display_name: Example QWidget
  menus:
    napari/layers/segment:
      - command: napari-colocalisation.make_container_widget
      - command: napari-colocalisation.make_magic_widget
      - command: napari-colocalisation.make_function_widget
      - command: napari-colocalisation.make_qwidget
