name: napari-colocalisation
display_name: Colocalisation
visibility: hidden
contributions:
  commands:
    - id: napari-colocalisation.make_widget
      python_name: napari_colocalisation:ColocalisationWidget
      title: Open Colocalisation Analysis
    - id: napari-colocalisation.make_sample_data
      python_name: napari_colocalisation._sample_data:make_sample_data
      title: Load 2D colocalisation sample
    - id: napari-colocalisation.make_sample_data_3d
      python_name: napari_colocalisation._sample_data:make_sample_data_3d
      title: Load 3D colocalisation sample
  widgets:
    - command: napari-colocalisation.make_widget
      display_name: Colocalisation Analysis
  sample_data:
    - command: napari-colocalisation.make_sample_data
      display_name: Colocalisation sample (2D)
      key: coloc_sample_v1
    - command: napari-colocalisation.make_sample_data_3d
      display_name: Colocalisation sample (3D)
      key: coloc_sample_v1_3d
