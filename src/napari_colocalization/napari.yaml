name: napari-colocalization
display_name: Colocalization
visibility: hidden
contributions:
  commands:
    - id: napari-colocalization.make_widget
      python_name: napari_colocalization:ColocalizationWidget
      title: Open Colocalization Analysis
    - id: napari-colocalization.make_sample_data
      python_name: napari_colocalization._sample_data:make_sample_data
      title: Load 2D colocalization sample
    - id: napari-colocalization.make_sample_data_3d
      python_name: napari_colocalization._sample_data:make_sample_data_3d
      title: Load 3D colocalization sample
    - id: napari-colocalization.make_sample_data_cbs006rbm
      python_name: napari_colocalization._sample_data:make_sample_data_cbs006rbm
      title: Load CBS006RBM real colocalization sample
  widgets:
    - command: napari-colocalization.make_widget
      display_name: Colocalization Analysis
  sample_data:
    - command: napari-colocalization.make_sample_data
      display_name: Colocalization sample (2D)
      key: coloc_sample_v1
    - command: napari-colocalization.make_sample_data_3d
      display_name: Colocalization sample (3D)
      key: coloc_sample_v1_3d
    - command: napari-colocalization.make_sample_data_cbs006rbm
      display_name: CBS006RBM (colocalization benchmark)
      key: coloc_sample_cbs006rbm
